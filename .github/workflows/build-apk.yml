name: Build & Deploy APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL -f -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Create gradle-wrapper.properties
        run: |
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties

      - name: Create gradlew script
        run: |
          printf '#!/bin/sh\nAPP_HOME=$( cd "${APP_HOME:-$(dirname "$0")}" > /dev/null && pwd -P ) || exit\nCLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar\nexec java $JAVA_OPTS -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
          chmod +x gradlew

      - name: Generate launcher icons
        run: |
          python3 -c "
          import struct, zlib
          def make_png(w, h, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for _ in range(h):
                  raw += b'\x00' + bytes([r, g, b]) * w
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          import os
          for density, px in sizes.items():
              d = f'app/src/main/res/mipmap-{density}'
              os.makedirs(d, exist_ok=True)
              with open(f'{d}/ic_launcher.png', 'wb') as f:
                  f.write(make_png(px, px, 0xF2, 0x4E, 0x1E))
          print('Generated PNG launcher icons')
          "
          find app/src/main/res/mipmap-* -name "*.png" -exec ls -la {} \;

      - name: Generate signing keystore
        run: |
          keytool -genkey -v -keystore release-key.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias cybersensei \
            -storepass cybersensei \
            -keypass cybersensei \
            -dname "CN=Cyber Sensei, OU=TV, O=CyberSensei, L=Budapest, ST=Budapest, C=HU"

      - name: Set version code from build number
        run: |
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          echo "Set versionCode to $VERSION_CODE"
          grep versionCode app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=${{ github.run_number }}
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberSenseiTV-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Deploy APK to Cyber Sensei server
        if: env.CYBER_SENSEI_URL != ''
        env:
          CYBER_SENSEI_URL: ${{ secrets.CYBER_SENSEI_URL }}
          CYBER_SENSEI_API_KEY: ${{ secrets.CYBER_SENSEI_API_KEY }}
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          echo "Uploading APK: $APK_FILE"
          echo "To server: $CYBER_SENSEI_URL"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$CYBER_SENSEI_URL/api/tv/app-versions/upload" \
            -H "X-TV-Deploy-Key: $CYBER_SENSEI_API_KEY" \
            -F "apk=@$APK_FILE" \
            -F "version=${{ steps.version.outputs.version_name }}" \
            -F "versionCode=${{ steps.version.outputs.version_code }}" \
            -F "releaseNotes=Automated build from GitHub Actions" \
            -F "setLatest=true")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "APK uploaded successfully!"
          else
            echo "APK upload failed!"
            exit 1
          fi
