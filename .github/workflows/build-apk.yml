name: Build & Deploy APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL -f -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Create gradle-wrapper.properties
        run: |
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties

      - name: Create gradlew script
        run: |
          printf '#!/bin/sh\nAPP_HOME=$( cd "${APP_HOME:-$(dirname "$0")}" > /dev/null && pwd -P ) || exit\nCLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar\nexec java $JAVA_OPTS -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
          chmod +x gradlew

      - name: Generate launcher icons
        run: |
          mkdir -p app/src/main/res/drawable
          printf '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n  <solid android:color="#F24E1E"/>\n</shape>\n' > app/src/main/res/drawable/ic_launcher_background.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android"\n  android:width="108dp" android:height="108dp"\n  android:viewportWidth="108" android:viewportHeight="108">\n  <group android:translateX="22" android:translateY="22">\n    <path android:fillColor="#FFFFFF" android:pathData="M16,40 L16,24 Q16,18 22,18 L30,18 Q33,18 33,21 Q33,24 30,24 L24,24 Q22,24 22,26 L22,40 Q22,43 19,43 Q16,43 16,40 Z"/>\n    <path android:fillColor="#FFFFFF" android:pathData="M36,40 L36,33 L42,33 Q45,33 45,30.5 Q45,28 42,28 L36,28 L36,24 L43,24 Q49,24 49,30.5 Q49,37 43,37 L42,37 L42,40 Q42,43 39,43 Q36,43 36,40 Z"/>\n  </group>\n</vector>\n' > app/src/main/res/drawable/ic_launcher_foreground.xml
          ICON_XML='<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n  <background android:drawable="@drawable/ic_launcher_background"/>\n  <foreground android:drawable="@drawable/ic_launcher_foreground"/>\n</adaptive-icon>\n'
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "app/src/main/res/mipmap-${density}"
            printf "$ICON_XML" > "app/src/main/res/mipmap-${density}/ic_launcher.xml"
          done
          echo "Generated adaptive launcher icons"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]*//g')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberSenseiTV-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Deploy APK to Cyber Sensei server
        if: env.CYBER_SENSEI_URL != ''
        env:
          CYBER_SENSEI_URL: ${{ secrets.CYBER_SENSEI_URL }}
          CYBER_SENSEI_API_KEY: ${{ secrets.CYBER_SENSEI_API_KEY }}
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          echo "Uploading APK: $APK_FILE"
          echo "To server: $CYBER_SENSEI_URL"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$CYBER_SENSEI_URL/api/tv/app-versions/upload" \
            -H "X-TV-Deploy-Key: $CYBER_SENSEI_API_KEY" \
            -F "apk=@$APK_FILE" \
            -F "version=${{ steps.version.outputs.version_name }}" \
            -F "versionCode=${{ steps.version.outputs.version_code }}" \
            -F "releaseNotes=Automated build from GitHub Actions" \
            -F "setLatest=true")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "APK uploaded successfully!"
          else
            echo "APK upload failed!"
            exit 1
          fi
