name: Build & Deploy APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle-8.5.zip
          unzip -qo /tmp/gradle-8.5.zip -d /tmp/gradle-extract
          cp /tmp/gradle-extract/gradle-8.5/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME=$( cd "${APP_HOME:-$(dirname "$0")}" > /dev/null && pwd -P ) || exit
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec java $JAVA_OPTS -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          sed -i 's/^          //' gradlew
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]*//g')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberSenseiTV-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Deploy APK to Cyber Sensei server
        if: env.CYBER_SENSEI_URL != ''
        env:
          CYBER_SENSEI_URL: ${{ secrets.CYBER_SENSEI_URL }}
          CYBER_SENSEI_API_KEY: ${{ secrets.CYBER_SENSEI_API_KEY }}
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          
          echo "Uploading APK: $APK_FILE"
          echo "To server: $CYBER_SENSEI_URL"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$CYBER_SENSEI_URL/api/tv/app-versions/upload" \
            -H "X-TV-Deploy-Key: $CYBER_SENSEI_API_KEY" \
            -F "apk=@$APK_FILE" \
            -F "version=${{ steps.version.outputs.version_name }}" \
            -F "versionCode=${{ steps.version.outputs.version_code }}" \
            -F "releaseNotes=Automated build from GitHub Actions" \
            -F "setLatest=true")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "APK uploaded successfully!"
          else
            echo "APK upload failed!"
            exit 1
          fi
